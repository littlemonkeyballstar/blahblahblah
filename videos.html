  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .text-gold-gradient { background: linear-gradient(135deg, #e8c97a, #d4a853, #c49a3c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .islamic-pattern { background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d4a853' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E"); }
    .thumb-box { background: linear-gradient(180deg, #0f172a 0%, #1a2332 100%); }
    .media-thumb { height: 12rem; }
    @media (min-width: 640px) { .media-thumb { height: 13rem; } }

<body class="bg-slate-950 text-slate-200 islamic-pattern min-h-screen flex flex-col">

  <div id="siteTopBar"></div>

  <header class="site-header bg-slate-925/90 backdrop-blur border-b border-slate-800 sticky top-0 z-50">
    <div class="site-header__inner max-w-[90rem] mx-auto px-4 sm:px-8 py-3 sm:py-5 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4">
      <a href="index.html" class="site-header__title font-display text-xl sm:text-3xl font-bold text-gold-gradient text-center sm:text-left shrink-0">Shaykh Abdullah Faisal</a>
      <nav class="site-nav flex sm:flex-wrap gap-1 text-sm font-medium justify-start sm:justify-end">
        <a href="index.html" data-nav="home" class="px-4 py-2 rounded-full transition">Home</a>
        <a href="biography.html" data-nav="biography" class="px-4 py-2 rounded-full transition"><span class="nav-long">Biography</span><span class="nav-short">Bio</span></a>
        <a href="clips.html" data-nav="clips" class="px-4 py-2 rounded-full transition"><span class="nav-long">Clips/Shorts</span><span class="nav-short">Clips</span></a>
        <a href="videos.html" data-nav="videos" class="px-4 py-2 rounded-full transition"><span class="nav-long">Video Lectures</span><span class="nav-short">Videos</span></a>
        <a href="audio.html" data-nav="audio" class="px-4 py-2 rounded-full transition"><span class="nav-long">Audio Lectures</span><span class="nav-short">Audio</span></a>
        <a href="pdfs.html" data-nav="pdfs" class="px-4 py-2 rounded-full transition"><span class="nav-long">PDF Books</span><span class="nav-short">PDFs</span></a>
      </nav>
    </div>
  </header>

  <main class="flex-1 max-w-[90rem] mx-auto w-full px-4 sm:px-8 py-8 sm:py-10">
    <h1 class="font-display text-3xl sm:text-4xl text-gold-gradient mb-2">Video Lectures</h1>
    <p class="text-slate-400 text-sm mb-6"><span id="count">0</span> lectures streamed from <a href="https://archive.org/details/FaisalVideos" class="text-gold hover:underline" target="_blank" rel="noopener">Internet Archive</a></p>

    <div class="relative max-w-xl mb-8">
      <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
      <input id="search" type="search" placeholder="Search video lectures…" class="w-full pl-11 pr-4 py-3 rounded-xl bg-slate-900 border border-slate-700 focus:outline-none focus:border-gold/50">
    </div>

    <p class="text-sm text-slate-500 mb-5">Showing <span id="showing" class="text-gold">0</span> videos</p>
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-6"></div>
    <div id="pagination" class="flex justify-center gap-2 mt-10 flex-wrap"></div>
  </main>

  <footer class="border-t border-slate-800 bg-slate-925/50 py-10 px-4 text-center">
    <p id="siteTelegram" class="mb-4"></p>
    <p id="siteDisclaimer" class="text-slate-500 text-sm max-w-2xl mx-auto leading-relaxed"></p>
  </footer>

  <script src="site.js"></script>
  <script src="videos-data.js"></script>
  <script>
    const state = { search: '', page: 1, perPage: 18 };

    function filtered() {
      if (!state.search.trim()) return VIDEOS;
      const q = state.search.toLowerCase();
      return VIDEOS.filter(v => v.title.toLowerCase().includes(q));
    }

    function render() {
      const list = filtered();
      document.getElementById('count').textContent = VIDEOS.length;
      const pages = Math.max(1, Math.ceil(list.length / state.perPage));
      if (state.page > pages) state.page = pages;
      const slice = list.slice((state.page - 1) * state.perPage, state.page * state.perPage);
      document.getElementById('showing').textContent = list.length;
      document.getElementById('grid').innerHTML = slice.map(v => mediaCard({
        id: 'video-' + v.id,
        thumb: v.thumb,
        title: v.title,
        stream: v.stream,
        hideThumbImage: true,
      })).join('') || '<p class="text-slate-500 col-span-full text-center py-16">No videos found.</p>';

      const pag = document.getElementById('pagination');
      if (pages <= 1) { pag.innerHTML = ''; return; }
      pag.innerHTML = Array.from({ length: pages }, (_, i) => i + 1)
        .filter(i => i === 1 || i === pages || Math.abs(i - state.page) <= 2)
        .map(i => `<button data-p="${i}" class="px-3 py-1.5 rounded-lg text-sm border ${i === state.page ? 'bg-gold text-slate-950 border-gold' : 'border-slate-700 hover:border-gold/40'}">${i}</button>`)
        .join('');
      pag.querySelectorAll('button').forEach(b => b.onclick = () => { state.page = +b.dataset.p; render(); window.scrollTo({ top: 0, behavior: 'smooth' }); });
    }

    function applyDeepLink() {
      const param = new URLSearchParams(location.search).get('video');
      if (param === null) return;
      const video = VIDEOS.find(v => v.id === parseInt(param, 10));
      if (!video) return;
      state.search = '';
      document.getElementById('search').value = '';
      const list = filtered();
      const idx = list.findIndex(v => v.id === video.id);
      if (idx >= 0) state.page = Math.floor(idx / state.perPage) + 1;
      render();
      requestAnimationFrame(() => {
        const el = document.getElementById('video-' + video.id);
        if (el) {
          el.classList.add('ring-2', 'ring-gold', 'shadow-lg', 'shadow-gold/20');
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    }

    document.getElementById('search').oninput = e => { state.search = e.target.value; state.page = 1; render(); };
    mountTopBar();
    document.getElementById('siteDisclaimer').textContent = SITE_DISCLAIMER;
    mountTelegramLink();
    setActiveNav('videos');
    render();
    applyDeepLink();
  </script>
</body>
</html>
