  <script src="site.js"></script>
  <script src="pdfs-data.js"></script>
  <script>
    const state = { search: '', category: 'all' };

    function sortedPdfs(list) {
      return [...list].sort((a, b) => (a.sortOrder ?? a.id) - (b.sortOrder ?? b.id));
    }

    function filtered() {
      let list = PDFS;
      if (state.category !== 'all') {
        list = list.filter(p => p.category === state.category);
      }
      const q = state.search.trim().toLowerCase();
      if (q) {
        list = list.filter(p => {
          const haystack = [p.title, p.categoryLabel, p.series, p.part ? `part ${p.part}` : ''].join(' ').toLowerCase();
          return haystack.includes(q);
        });
      }
      return sortedPdfs(list);
    }

    function shouldGroupSections(list) {
      return state.category === 'all' && !state.search.trim();
    }

    function pdfCardData(p) {
      return {
        id: 'pdf-' + p.id,
        title: p.title,
        sizeLabel: p.sizeLabel,
        downloadUrl: p.download,
        embedUrl: p.embed,
        detailsUrl: p.details,
        thumb: p.thumb,
        series: p.series,
        part: p.part,
        categoryLabel: p.categoryLabel,
      };
    }

    function renderCards(list) {
      return list.map(p => pdfCard(pdfCardData(p))).join('') || '<p class="text-slate-500 col-span-full text-center py-16">No books found.</p>';
    }

    function groupByCategory(list) {
      const groups = [];
      for (const cat of PDF_CATEGORIES) {
        const items = list.filter(p => p.category === cat.id);
        if (items.length) groups.push({ cat, items });
      }
      return groups;
    }

    function getSeriesGroups(list) {
      const seriesMap = new Map();
      for (const pdf of list) {
        if (!pdf.series) continue;
        if (!seriesMap.has(pdf.series)) seriesMap.set(pdf.series, []);
        seriesMap.get(pdf.series).push(pdf);
      }
      return [...seriesMap.entries()]
        .map(([name, pdfs]) => ({
          name,
          categoryLabel: pdfs[0]?.categoryLabel || '',
          items: pdfs.sort((a, b) => (a.part ?? 99) - (b.part ?? 99)),
          sortOrder: Math.min(...pdfs.map(p => p.sortOrder ?? p.id)),
        }))
        .sort((a, b) => a.sortOrder - b.sortOrder);
    }

    function renderSeriesBlocks(groups, { showCategory = false, className = 'space-y-5' } = {}) {
      if (!groups.length) return '';
      return `<div class="${className}">${groups.map(group => pdfSeriesBlock({
        name: group.name,
        items: group.items,
        categoryLabel: group.categoryLabel,
        showCategory,
      })).join('')}</div>`;
    }

    function renderCategoryChips() {
      const chips = document.getElementById('categoryChips');
      const counts = { all: PDFS.length };
      for (const cat of PDF_CATEGORIES) {
        counts[cat.id] = PDFS.filter(p => p.category === cat.id).length;
      }
      const items = [{ id: 'all', label: 'All books' }, ...PDF_CATEGORIES];
      chips.innerHTML = items
        .filter(item => item.id === 'all' || counts[item.id])
        .map(item => {
          const active = state.category === item.id;
          const count = counts[item.id];
          return `<button type="button" data-category="${item.id}" class="px-3.5 py-2 rounded-full text-sm border transition ${active ? 'bg-gold text-slate-950 border-gold font-semibold' : 'border-slate-700 text-slate-300 hover:border-gold/40 hover:text-gold'}">${escapeHtml(item.label)}${item.id === 'all' ? '' : ` <span class="opacity-70">(${count})</span>`}</button>`;
        }).join('');
      chips.querySelectorAll('button').forEach(btn => {
        btn.onclick = () => {
          state.category = btn.dataset.category;
          renderCategoryChips();
          render();
        };
      });
    }

    function render() {
      const list = filtered();
      const grouped = shouldGroupSections(list);
      document.getElementById('count').textContent = PDFS.length;
      document.getElementById('showing').textContent = list.length;
      document.getElementById('activeCategoryLabel').textContent =
        state.category !== 'all'
          ? ' in ' + (PDF_CATEGORIES.find(c => c.id === state.category)?.label || state.category)
          : (state.search.trim() ? ` matching "${state.search.trim()}"` : '');

      const sections = document.getElementById('sections');
      const grid = document.getElementById('grid');
      const pag = document.getElementById('pagination');

      const allSeries = getSeriesGroups(list);
      const standaloneList = sortedPdfs(list.filter(p => !p.series));

      animateContentSwap(sections, () => {
        if (grouped) {
          grid.classList.add('hidden');
          grid.innerHTML = '';
          pag.innerHTML = '';
          const seriesSection = allSeries.length ? `
            <section class="mb-12">
              <h2 class="font-display text-2xl text-gold-gradient mb-2 flex items-center gap-3">
                <i class="fas fa-list-ol text-gold/80"></i>
                Multi-Part Series
              </h2>
              <p class="text-sm text-slate-500 mb-6">Part 1, Part 2, and so on — grouped together and in reading order.</p>
              ${renderSeriesBlocks(allSeries, { showCategory: true, className: 'space-y-6' })}
            </section>` : '';

          const categorySections = groupByCategory(standaloneList).map(({ cat, items }) => `
            <section class="mb-12 last:mb-0">
              <h2 class="font-display text-2xl text-gold-gradient mb-6 flex items-center gap-3">
                <span class="w-8 h-px bg-gold/40"></span>
                ${escapeHtml(cat.label)}
                <span class="text-sm font-normal text-slate-500">(${items.length})</span>
              </h2>
              <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">${renderCards(items)}</div>
            </section>`).join('');

          sections.innerHTML = (seriesSection + categorySections) || '<p class="text-slate-500 text-center py-16">No books found.</p>';
          bindPdfPreviewControls(sections);
          return;
        }

        sections.innerHTML = '';
        grid.classList.add('hidden');
        pag.innerHTML = '';

        const filteredSeries = getSeriesGroups(list);
        const filteredStandalone = sortedPdfs(list.filter(p => !p.series));
        const seriesHtml = filteredSeries.length
          ? `<div class="mb-8">${renderSeriesBlocks(filteredSeries, { showCategory: state.category === 'all' })}</div>`
          : '';
        const standaloneHtml = filteredStandalone.length
          ? `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">${renderCards(filteredStandalone)}</div>`
          : '';

        sections.innerHTML = (seriesHtml + standaloneHtml) || '<p class="text-slate-500 text-center py-16">No books found.</p>';
        bindPdfPreviewControls(sections);
      });
    }

    function applyDeepLink() {
      const param = new URLSearchParams(location.search).get('pdf');
      if (param === null) return;
      const pdf = PDFS.find(p => p.id === parseInt(param, 10));
      if (!pdf) return;
      state.search = '';
      document.getElementById('search').value = '';
      if (pdf.category) state.category = 'all';
      render();
      requestAnimationFrame(() => {
        const el = document.getElementById('pdf-' + pdf.id);
        if (el) {
          el.classList.add('ring-2', 'ring-gold', 'shadow-lg', 'shadow-gold/20');
          el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        if (pdf.embed) {
          openPdfPreview({
            title: pdf.title,
            embedUrl: pdf.embed,
            downloadUrl: pdf.download,
            detailsUrl: pdf.details,
          });
        }
      });
    }

    document.getElementById('search').oninput = e => { state.search = e.target.value; render(); };
    mountTopBar();
    mountPdfPreviewModal();
    document.getElementById('siteDisclaimer').textContent = SITE_DISCLAIMER;
    mountTelegramLink();
    setActiveNav('pdfs');
    renderCategoryChips();
    render();
    applyDeepLink();
  </script>
